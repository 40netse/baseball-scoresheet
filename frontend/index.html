<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baseball Scoresheet</title>
    <link rel="stylesheet" href="css/scoresheet.css">
</head>
<body>
    <header id="header-bar">
        <h1>Baseball Scoresheet</h1>
        <div id="game-selector">
            <label for="game-date">Date:</label>
            <input type="date" id="game-date">
            <button id="load-games">Load Games</button>
            <select id="game-list">
                <option value="">-- Select a game --</option>
            </select>
            <button id="load-scorecard" disabled>Load Scorecard</button>
        </div>
    </header>

    <main>
        <!-- Game view (hidden until a game is loaded) -->
        <div id="game-view" style="display:none;">
            <div id="game-top-bar">
                <button id="back-btn">&larr; Back</button>
                <div id="game-info">
                    <span id="away-team"></span>
                    <span class="vs">at</span>
                    <span id="home-team"></span>
                    <span id="game-status"></span>
                </div>
                <span id="venue"></span>
            </div>

            <!-- Line score -->
            <div id="linescore-container">
                <table id="linescore">
                    <thead>
                        <tr></tr>
                    </thead>
                    <tbody>
                        <tr id="away-linescore"></tr>
                        <tr id="home-linescore"></tr>
                    </tbody>
                </table>
            </div>

            <!-- Pitcher boxes side by side -->
            <div id="pitcher-row">
                <div id="away-pitchers" class="pitcher-box"></div>
                <div id="home-pitchers" class="pitcher-box"></div>
            </div>

            <!-- Scoresheet -->
            <div id="scoresheet-container">
                <div class="team-sheet" id="away-sheet" style="display:none;">
                    <h2 id="away-team-name">Away</h2>
                    <svg id="away-scorecard" class="scorecard-svg"></svg>
                </div>
                <div class="team-sheet" id="home-sheet" style="display:none;">
                    <h2 id="home-team-name">Home</h2>
                    <svg id="home-scorecard" class="scorecard-svg"></svg>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/scoresheet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
